<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ДР — Собор Александра Невского</title>

    <!-- A-Frame + AR.js (location-based) -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <style>
        /* Кнопка закрытия */
        .ar-close {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 9999;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Подсказка внизу */
        .ar-hint {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: -apple-system, sans-serif;
            font-size: 0.85rem;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Кнопка возврата -->
    <button class="ar-close" onclick="history.back()">&times;</button>

    <!-- Подсказка -->
    <div class="ar-hint" id="hint">Направьте камеру в сторону объекта</div>

    <!--
        A-Frame сцена с AR.js (location-based).
        gps-camera: привязка камеры к GPS-координатам устройства.
        gps-entity-place: размещает 3D-модель по реальным координатам.
        Модель будет видна, когда пользователь находится вблизи Стрелки
        и направляет камеру в сторону объекта.
    -->
    <a-scene
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
        renderer="antialias: true; alpha: true"
        embedded>

        <a-camera gps-new-camera="gpsMinDistance: 5" look-controls-enabled="false"></a-camera>

        <!-- 3D-модель, привязанная к GPS-координатам объекта -->
        <!-- ЗАМЕНИТЕ latitude/longitude на координаты нужного объекта -->
        <!-- ЗАМЕНИТЕ src на путь к вашей модели -->
        <a-entity
            gps-new-entity-place="latitude: 56.3270; longitude: 43.9610"
            gltf-model="../models/sobor.glb"
            scale="2 2 2"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 30000; easing: linear">
        </a-entity>

    </a-scene>

    <script>
        // Скрываем подсказку через 5 секунд
        setTimeout(function() {
            document.getElementById('hint').style.opacity = '0';
            document.getElementById('hint').style.transition = 'opacity 1s';
        }, 5000);
    </script>

</body>
</html>
